server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# WeChat MiniApp Configuration
wx:
  miniapp:
    appid: ${WECHAT_APPID:}
    secret: ${WECHAT_SECRET:}

# File Upload Configuration
file:
  upload:
    path: ${FILE_UPLOAD_PATH:D:/campus-uploads}
  access:
    url: /uploads
